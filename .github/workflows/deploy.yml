name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy ThaiHelp Laravel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          VERSION="v1.$(date +'%Y%m%d').$(git rev-list --count HEAD)"
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_APP_ID: ${{ secrets.DISCORD_APPLICATION_ID }}
          DISCORD_PUBKEY: ${{ secrets.DISCORD_PUBLIC_KEY }}
          DISCORD_GUILD: ${{ secrets.DISCORD_GUILD_ID }}
          GOOGLE_CID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CSECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          LINE_CID: ${{ secrets.LINE_CHANNEL_ID }}
          LINE_CSECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
          APP_VER: ${{ steps.version.outputs.version }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: DISCORD_TOKEN,DISCORD_APP_ID,DISCORD_PUBKEY,DISCORD_GUILD,GOOGLE_CID,GOOGLE_CSECRET,LINE_CID,LINE_CSECRET,APP_VER
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.DEPLOY_PATH }}"

            echo "=========================================="
            echo "  ThaiHelp Deploy - ${APP_VER}"
            echo "=========================================="

            # Ensure php extensions are installed
            PHP_VER=$(php -r 'echo PHP_MAJOR_VERSION.".".PHP_MINOR_VERSION;')
            NEED_RESTART=0
            for EXT in sodium redis opcache; do
              if ! php -m 2>/dev/null | grep -qi "$EXT"; then
                echo ">>> Installing php${PHP_VER}-${EXT}..."
                sudo apt-get install -y -qq "php${PHP_VER}-${EXT}" 2>/dev/null || true
                NEED_RESTART=1
              fi
            done
            # Install edge-tts for น้องหญิง voice (PremwadeeNeural)
            if ! command -v edge-tts >/dev/null 2>&1; then
              echo ">>> Installing edge-tts (Thai Neural TTS)..."
              # Ensure pip3 is available
              if ! command -v pip3 >/dev/null 2>&1; then
                sudo apt-get install -y -qq python3-pip 2>/dev/null || true
              fi
              pip3 install --user edge-tts 2>/dev/null || pip3 install edge-tts 2>/dev/null || sudo pip3 install edge-tts 2>/dev/null || true
              # Add user bin to PATH
              export PATH="$HOME/.local/bin:$PATH"
              echo 'export PATH="$HOME/.local/bin:$PATH"' >> ~/.bashrc 2>/dev/null || true
            fi
            # Verify edge-tts works
            if command -v edge-tts >/dev/null 2>&1; then
              echo ">>> edge-tts OK: $(edge-tts --version 2>&1 || echo 'installed')"
            else
              echo ">>> WARNING: edge-tts not available — TTS will fallback to Web Speech"
            fi

            if ! command -v redis-server >/dev/null 2>&1; then
              sudo apt-get install -y -qq redis-server 2>/dev/null || true
              sudo systemctl enable redis-server 2>/dev/null || true
              sudo systemctl start redis-server 2>/dev/null || true
              NEED_RESTART=1
            fi
            [ "$NEED_RESTART" -eq 1 ] && { sudo systemctl restart apache2 2>/dev/null || sudo systemctl restart httpd 2>/dev/null || true; }

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$(dirname "$APP_DIR")"
              git clone https://github.com/xjanova/thaihelp-laravel.git "$APP_DIR"
              cd "$APP_DIR"
              [ ! -f .env ] && cp .env.example .env && php artisan key:generate --force
              composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
              npm ci && npm run build
              mkdir -p storage/logs storage/framework/{sessions,views,cache} storage/backups bootstrap/cache
              chmod -R 775 storage bootstrap/cache
              DOMAIN_DIR="$(dirname "$APP_DIR")"
              PH="$DOMAIN_DIR/public_html"
              [ ! -L "$PH" ] && rm -rf "$PH" && ln -s "$APP_DIR/public" "$PH"
              php artisan migrate --force 2>&1 || true
              php artisan storage:link 2>&1 || true
              exit 0
            fi

            cd "$APP_DIR"

            # Redis env
            grep -q "^REDIS_CLIENT=" .env || echo -e "\nREDIS_CLIENT=predis\nREDIS_HOST=127.0.0.1\nREDIS_PASSWORD=null\nREDIS_PORT=6379" >> .env
            sed -i 's/^SESSION_DRIVER=database/SESSION_DRIVER=redis/' .env 2>/dev/null || true
            sed -i 's/^CACHE_STORE=database/CACHE_STORE=redis/' .env 2>/dev/null || true
            sed -i 's/^QUEUE_CONNECTION=database/QUEUE_CONNECTION=redis/' .env 2>/dev/null || true

            # Discord env
            if [ -n "$DISCORD_TOKEN" ]; then
              grep -q "^DISCORD_BOT_TOKEN=" .env || echo -e "\nDISCORD_BOT_TOKEN=${DISCORD_TOKEN}\nDISCORD_APPLICATION_ID=${DISCORD_APP_ID}\nDISCORD_PUBLIC_KEY=${DISCORD_PUBKEY}\nDISCORD_GUILD_ID=${DISCORD_GUILD}" >> .env
            fi

            # Google OAuth env
            if [ -n "$GOOGLE_CID" ]; then
              grep -q "^GOOGLE_CLIENT_ID=" .env && sed -i "s|^GOOGLE_CLIENT_ID=.*|GOOGLE_CLIENT_ID=${GOOGLE_CID}|" .env || echo -e "\nGOOGLE_CLIENT_ID=${GOOGLE_CID}" >> .env
              grep -q "^GOOGLE_CLIENT_SECRET=" .env && sed -i "s|^GOOGLE_CLIENT_SECRET=.*|GOOGLE_CLIENT_SECRET=${GOOGLE_CSECRET}|" .env || echo -e "GOOGLE_CLIENT_SECRET=${GOOGLE_CSECRET}" >> .env
              grep -q "^GOOGLE_REDIRECT_URI=" .env || echo "GOOGLE_REDIRECT_URI=https://thaihelp.xman4289.com/auth/google/callback" >> .env
            fi

            # LINE OAuth env
            if [ -n "$LINE_CID" ]; then
              grep -q "^LINE_CHANNEL_ID=" .env && sed -i "s|^LINE_CHANNEL_ID=.*|LINE_CHANNEL_ID=${LINE_CID}|" .env || echo -e "\nLINE_CHANNEL_ID=${LINE_CID}" >> .env
              grep -q "^LINE_CHANNEL_SECRET=" .env && sed -i "s|^LINE_CHANNEL_SECRET=.*|LINE_CHANNEL_SECRET=${LINE_CSECRET}|" .env || echo -e "LINE_CHANNEL_SECRET=${LINE_CSECRET}" >> .env
              grep -q "^LINE_REDIRECT_URI=" .env || echo "LINE_REDIRECT_URI=https://thaihelp.xman4289.com/auth/line/callback" >> .env
            fi

            # Deploy
            bash deploy.sh main

            # Version + clear cache
            echo "${APP_VER}" > version.txt
            php artisan config:clear 2>/dev/null || true

            # Discord setup
            if [ -n "$DISCORD_TOKEN" ]; then
              php artisan discord:setup --skip-endpoint 2>&1 || true
            fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: |
            **Commit:** `${{ steps.version.outputs.short_sha }}` — ${{ github.event.head_commit.message }}
            **By:** ${{ github.actor }}
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
