<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThaiHelp - Offline</title>
    <style>
        body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#0a0e17; color:#e2e8f0; font-family:'Noto Sans Thai',sans-serif; }
        .container { text-align:center; padding:2rem; }
        h1 { font-size:2rem; margin-bottom:0.5rem; }
        h1 span:first-child { color:#3b82f6; }
        h1 span:last-child { color:#f97316; }
        p { color:#94a3b8; margin:1rem 0; }
        .icon { font-size:4rem; margin-bottom:1rem; }
        button { background:#f97316; color:white; border:none; padding:0.75rem 2rem; border-radius:1rem; font-size:1rem; cursor:pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1><span>Thai</span><span>Help</span></h1>
        <p>ไม่มีสัญญาณอินเทอร์เน็ต</p>
        <p>กรุณาตรวจสอบการเชื่อมต่อแล้วลองใหม่</p>
        <button onclick="location.reload()">ลองใหม่</button>
    </div>
</body>
</html>
